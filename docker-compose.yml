services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - GIT_COMMIT=${GIT_COMMIT:-unknown}
        - GIT_BRANCH=${GIT_BRANCH:-unknown}
        - BUILD_DATE=${BUILD_DATE:-unknown}
    ports:
      - "8081:8000"
    volumes:
      # データ永続化用のボリューム
      - /mnt/hdd01/docker_data/squashterm/data:/app/server/data
      - ./config:/app/server/config
      # 開発時のコード変更を反映（オプション）
      - ./server:/app/server
      # git情報をコンテナから参照可能にする（バージョン自動取得用）
      - ./.git:/app/.git:ro
    environment:
      - PYTHONUNBUFFERED=1
      # docker ブランチ限定: ytdlp-core-api 経由で IP 制限をバイパス
      - YTDLP_API_URL=http://ytdlp-core-api:8000
      # docker ブランチ限定: otomad-core-api への登録同期
      - OTOMAD_API_URL=http://otomad-core-api:8000
      - OTOMAD_SERVICE_KEY=wayamoti2015
      - OTOMAD_SERVICE_UUID=826ef615-3184-4e1f-b0b5-53e2bcbe7592
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - default
      - ytdlp-network
      - otomad-network

networks:
  default:
  ytdlp-network:
    external: true
  otomad-network:
    external: true
